<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>NASFAA Disclosure Quiz</title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../shared/theme-toggle.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="terminal" aria-label="Quiz terminal">
    <div class="scanlines" aria-hidden="true"></div>
    <header class="banner">
      <div class="title">NASFAA DISCLOSURE QUIZ</div>
      <div class="disclaimer">For Entertainment Purposes Only</div>
      <div class="subtitle" id="subtitle"></div>
    </header>
    <pre id="screen" role="log" aria-live="polite">Loading…</pre>
    <div id="prompt-line" class="prompt-line">
      <span id="prompt-text" class="prompt-text"></span>
      <span id="cursor" class="cursor" aria-hidden="true">▌</span>
    </div>

    <div id="touch-controls" aria-hidden="true">
      <button type="button" id="btn-permit">[P]ermit</button>
      <button type="button" id="btn-deny">[D]eny</button>
      <button type="button" id="btn-advance">[Space] Next</button>
      <button type="button" id="btn-restart">[R]estart</button>
      <button type="button" id="btn-quit">[Q]uit</button>
    </div>

    <footer class="build-footer">Build: <code id="build-sha">dev</code></footer>
  </main>

  <button
      type="button"
      class="theme-toggle center"
      onclick="NasfaaTheme.cycle(); document.getElementById('theme-label').textContent = NasfaaTheme.current();"
      aria-label="Cycle color theme">theme [m]: <span id="theme-label" class="theme-toggle__label">light</span></button>

  <a href="https://blurbpress.com"
     class="shamrock-link"
     aria-label="Blurbpress"><span class="shamrock">&#9752;</span> blurbpress.com</a>

  <script src="../shared/theme.js"></script>
  <script src="data.js"></script>
  <script src="engine.js"></script>
  <script src="box-draw.js"></script>
  <script src="quiz.js"></script>
  <script src="app.js"></script>
</body>
</html>
