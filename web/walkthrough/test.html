<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NASFAA Walkthrough — Scenario Tests</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="scanlines" aria-hidden="true"></div>

    <main class="terminal" role="main">
      <header class="banner">
        <div class="title">NASFAA Scenario Test Harness</div>
        <div class="subtitle">
          Loads every scenario from <code>scenarios.json</code> and runs<br />
          it through <code>engine.js</code> (first-match-wins). Each scenario's<br />
          <code>expected.rule_id</code> and <code>expected.result</code> must match.
        </div>
        <div class="hint">
          When rules change, scenarios are the canonical contract.
        </div>
      </header>

      <div class="tests-summary" id="tests-summary">running tests...</div>

      <ul class="tests-list" id="tests-out"></ul>

      <footer class="footer">
        <a href="index.html">walkthrough</a>
      </footer>
    </main>

    <script type="module" src="tests.js"></script>
  </body>
</html>
